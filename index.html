<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>习惯打卡</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(145deg, #d4eaf7 0%, #b0d4e8 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }

  .container {
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 32px 28px;
    box-shadow: 0 8px 40px rgba(150, 180, 200, 0.25);
    border: 1px solid rgba(255,255,255,0.5);
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .date-section {
    display: flex;
    flex-direction: column;
  }

  .date-weekday {
    font-size: 13px;
    color: #7a9bb5;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .date-day {
    font-size: 22px;
    font-weight: 700;
    color: #2c4a5e;
    line-height: 1.3;
  }

  .progress-ring {
    position: relative;
    width: 56px;
    height: 56px;
  }

  .progress-ring svg {
    transform: rotate(-90deg);
  }

  .progress-ring .bg {
    fill: none;
    stroke: #d4e8f2;
    stroke-width: 4;
  }

  .progress-ring .fg {
    fill: none;
    stroke: #6bb5d9;
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.45s ease;
  }

  .progress-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #2c4a5e;
  }

  .habit-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
    min-height: 80px;
  }

  .habit-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #fff;
    border-radius: 14px;
    padding: 14px 18px;
    box-shadow: 0 2px 8px rgba(160, 185, 200, 0.12);
    transition: box-shadow 0.2s, opacity 0.25s;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .habit-item:active {
    box-shadow: 0 1px 3px rgba(160, 185, 200, 0.15);
  }

  .habit-item.done {
    opacity: 0.7;
  }

  .habit-item.done .habit-name {
    text-decoration: line-through;
    color: #8aaec0;
  }

  .check-circle {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2.5px solid #b8d4e6;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    color: transparent;
    font-size: 15px;
    font-weight: 700;
  }

  .habit-item.done .check-circle {
    background: #6bb5d9;
    border-color: #6bb5d9;
    color: #fff;
  }

  .habit-name {
    flex: 1;
    font-size: 16px;
    font-weight: 500;
    color: #2c4a5e;
    transition: color 0.25s;
  }

 .delete-btn {
   flex-shrink: 0;
   width: 28px;
   height: 28px;
   border: none;
   background: transparent;
   border-radius: 50%;
   cursor: pointer;
   display: flex;
   align-items: center;
   justify-content: center;
   color: #b8cbd8;
   font-size: 16px;
   transition: all 0.2s;
 }
  @media (hover: hover) {
    .delete-btn {
      opacity: 0;
      pointer-events: none;
    }
    .habit-item:hover .delete-btn {
      opacity: 1;
      pointer-events: auto;
    }
    .delete-btn:hover {
      background: #f0f4f7;
      color: #d16b6b;
    }
  }
  @media (hover: none) {
    .habit-item {
      padding-right: 8px;
    }
  }

  .add-form {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .add-form input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #d4e4ef;
    border-radius: 14px;
    font-size: 15px;
    outline: none;
    background: #fff;
    color: #2c4a5e;
    transition: border-color 0.2s;
  }

  .add-form input::placeholder {
    color: #aec4d4;
  }

  .add-form input:focus {
    border-color: #89c4e0;
  }

  .add-form button {
    padding: 12px 20px;
    border: none;
    border-radius: 14px;
    background: #89c4e0;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .add-form button:hover {
    background: #6bb5d9;
  }

  .empty-msg {
    text-align: center;
    color: #9bb9cd;
    font-size: 14px;
    padding: 24px 0 20px;
    line-height: 1.6;
  }

  .empty-msg span {
    display: block;
    font-size: 28px;
    margin-bottom: 8px;
  }

 @media (max-width: 500px) {
   body { padding: 16px 12px; }
   .container { padding: 24px 18px; border-radius: 20px; }
   .habit-item { padding: 12px 14px; }
   .date-day { font-size: 19px; }
 }

  .footer-hint {
    text-align: center;
    color: #aec4d4;
    font-size: 12px;
    margin-top: 16px;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="container" id="app">
  <div class="header">
    <div class="date-section">
      <span class="date-weekday" id="weekday"></span>
      <span class="date-day" id="dateDisplay"></span>
    </div>
    <div class="progress-ring">
      <svg width="56" height="56" viewBox="0 0 56 56">
        <circle class="bg" cx="28" cy="28" r="24" />
        <circle class="fg" id="progressCircle" cx="28" cy="28" r="24"
          stroke-dasharray="150.8" stroke-dashoffset="150.8" />
      </svg>
      <span class="progress-text" id="progressText">0/0</span>
    </div>
  </div>

  <ul class="habit-list" id="habitList"></ul>

  <form class="add-form" id="addForm">
    <input type="text" id="habitInput" placeholder="添加新习惯…" maxlength="30" autocomplete="off">
    <button type="submit">添加</button>
  </form>
  <div class="footer-hint">点一下习惯完成打卡 ✓</div>
</div>

<script>
  const STORAGE_KEY = 'habit_tracker_data';
  const CIRCUMFERENCE = 2 * Math.PI * 24;

  let state = loadState();

  // ── Data helpers ──
  function getToday() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function getWeekday() {
    const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    return days[new Date().getDay()];
  }

  function formatDate() {
    const d = new Date();
    return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
  }

  function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      try {
        const parsed = JSON.parse(raw);
        if (!parsed.records) parsed.records = {};
        return parsed;
      } catch { /* fall through */ }
    }
    return { habits: [], records: {} };
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function getDoneIds() {
    const today = getToday();
    return state.records[today] || [];
  }

  function setDoneIds(ids) {
    state.records[getToday()] = ids;
    saveState();
  }

  // ── Render ──
  function render() {
    const list = document.getElementById('habitList');
    const doneIds = getDoneIds();
    const total = state.habits.length;
    const done = doneIds.length;

    document.getElementById('progressText').textContent = total > 0 ? `${done}/${total}` : '0/0';
    const circle = document.getElementById('progressCircle');
    const offset = total > 0 ? CIRCUMFERENCE * (1 - done / total) : CIRCUMFERENCE;
    circle.setAttribute('stroke-dashoffset', offset);

    document.getElementById('weekday').textContent = getWeekday();
    document.getElementById('dateDisplay').textContent = formatDate();

    if (total === 0) {
      list.innerHTML = `<li class="empty-msg"><span>✋</span>还没有习惯呢<br>在下方输入添加吧</li>`;
      return;
    }

    list.innerHTML = state.habits.map(h => {
      const checked = doneIds.includes(h.id) ? 'done' : '';
      return `
        <li class="habit-item ${checked}" data-id="${h.id}">
          <span class="check-circle">✓</span>
          <span class="habit-name">${escapeHtml(h.name)}</span>
          <button class="delete-btn" data-action="delete" title="删除">✕</button>
        </li>
      `;
    }).join('');
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ── Actions ──
  function toggleHabit(id) {
    let doneIds = getDoneIds();
    if (doneIds.includes(id)) {
      doneIds = doneIds.filter(d => d !== id);
    } else {
      doneIds.push(id);
    }
    setDoneIds(doneIds);
    render();
  }

  function addHabit(name) {
    const trimmed = name.trim();
    if (!trimmed) return false;
    const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    state.habits.push({ id, name: trimmed });
    saveState();
    render();
    return true;
  }

 function deleteHabit(id) {
   if (!confirm('确定要删除这个习惯吗？')) return;
   state.habits = state.habits.filter(h => h.id !== id);
    const today = getToday();
    if (state.records[today]) {
      state.records[today] = state.records[today].filter(did => did !== id);
    }
    for (const date of Object.keys(state.records)) {
      state.records[date] = state.records[date].filter(did => did !== id);
      if (state.records[date].length === 0) {
        delete state.records[date];
      }
    }
    saveState();
    render();
  }

  // ── Event binding ──
  document.getElementById('habitList').addEventListener('click', (e) => {
    const item = e.target.closest('.habit-item');
    if (!item) return;
    if (e.target.closest('[data-action="delete"]')) {
      deleteHabit(item.dataset.id);
      return;
    }
    toggleHabit(item.dataset.id);
  });

  document.getElementById('addForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const input = document.getElementById('habitInput');
    if (addHabit(input.value)) {
      input.value = '';
      input.focus();
    }
  });

  document.getElementById('habitInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('addForm').dispatchEvent(new Event('submit'));
    }
  });

  render();
</script>
</body>
</html>
